<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Lecteur RSS minimaliste basé sur OPML pour GitHub Pages">
    <meta name="color-scheme" content="light dark">
    <title>📡 Lecteur RSS Flux</title>
    
    <!-- Framework Simple.css -->
    <link rel="stylesheet" href="https://cdn.simplecss.org/simple.min.css">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- En-tête principal -->
    <header>
        <h1>📡 Lecteur RSS Flux</h1>
        <button id="btnTheme" aria-label="Basculer le thème">🌙</button>
    </header>

    <!-- Contenu principal -->
    <main>
        <div style="display: grid; grid-template-columns: 280px 1fr; gap: 1rem; min-height: 80vh;">
            
            <!-- Barre latérale (aside) -->
            <aside>
                <h2>Mes Flux</h2>
                
                <!-- Actions -->
                <button id="btnImportOPML" onclick="document.getElementById('opmlInput').click()">
                    ➕ Importer OPML
                </button>
                <button id="btnExportOPML" secondary>⬇️ Exporter</button>
                
                <!-- Recherche -->
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Chercher un flux..."
                    aria-label="Rechercher un flux"
                >
                
                <!-- Liste des flux -->
                <nav id="fluxList" aria-label="Liste des flux RSS">
                    <!-- Les flux seront générés ici -->
                </nav>
                
                <!-- Message vide -->
                <p id="emptyState" style="display: none; text-align: center; color: var(--form-element-invalid-border-color);">
                    Aucun flux. Importez un fichier OPML!
                </p>
            </aside>

            <!-- Zone principale -->
            <article>
                <!-- En-tête du flux -->
                <section id="feedHeader" style="display: none;">
                    <h2 id="feedTitle"></h2>
                    <p id="feedDescription"></p>
                </section>

                <!-- Grille d'articles -->
                <section id="articlesGrid" role="main" aria-label="Articles du flux">
                    <p>Sélectionnez un flux pour voir les articles</p>
                </section>
            </article>
        </div>
    </main>

    <!-- Modale article -->
    <dialog id="articleModal">
        <article>
            <button aria-label="Fermer" onclick="document.getElementById('articleModal').close()" style="float: right;">✕</button>
            
            <h2 id="modalTitle"></h2>
            <p id="modalMeta" style="font-size: 0.9rem; color: var(--muted-color);"></p>
            
            <figure id="modalImage"></figure>
            
            <div id="modalContent"></div>
            
            <footer>
                <a id="modalLink" href="#" target="_blank">Lire l'article complet →</a>
            </footer>
        </article>
    </dialog>

    <!-- Input caché pour l'import OPML -->
    <input type="file" id="opmlInput" accept=".opml,.xml" style="display: none;">

    <!-- Scripts -->
    <script src="js/opml-parser.js"></script>
    <script src="js/feed-manager.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
